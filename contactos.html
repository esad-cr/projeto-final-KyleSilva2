                <div class="contact-photo">
                    <img src="imagens/cards/card sobre mim.jpeg" alt="Fotógrafo em festival">

                <div class="contact-panel">
 
                    <div class="contact-info">
                        <div class="ci-icon">

                        </div>
                        <div class="ci-details">

                    </div>
 
                    <h3>Me contate</h3>
 
                    <div class="contact-form">

                            <input type="email" placeholder="Email" />
                        </div>
                        <input type="text" placeholder="Remetente" />
                        <textarea placeholder="Escreva sua mensagem aqui..."></textarea>
                        <button class="contact-btn-submit">Enviar</button>
                    </div>
 

                    <div class="contact-social">

                        <a href="#" aria-label="Twitter"><i class="ri-twitter-x-fill"></i></a>
